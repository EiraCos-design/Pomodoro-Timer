<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Pomodoro Timer App Icon</title>
  <desc id="desc">Minimal green pomodoro timer icon with a circular progress ring and 25:00 in the center on a transparent background.</desc>

  <!-- Transparent background -->
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f2f1f" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Rounded card shape -->
  <rect x="36" y="36" width="440" height="440" rx="96" fill="#f7fbf8" filter="url(#softShadow)"/>

  <!-- Base progress ring -->
  <circle
    cx="256"
    cy="220"
    r="138"
    fill="none"
    stroke="#cfe6d4"
    stroke-width="18"
    stroke-linecap="round"
  />

  <!-- Active progress arc -->
  <circle
    cx="256"
    cy="220"
    r="138"
    fill="none"
    stroke="#3f8f5a"
    stroke-width="18"
    stroke-linecap="round"
    stroke-dasharray="150 867"
    transform="rotate(-90 256 220)"
  />

  <!-- Time -->
  <text
    x="256"
    y="238"
    text-anchor="middle"
    font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
    font-size="64"
    font-weight="700"
    fill="#1f5f3d"
    letter-spacing="-2"
  >25:00</text>

  <!-- Focus pill -->
  <rect x="176" y="386" width="160" height="52" rx="26" fill="#5aa06d"/>
  <text
    x="256"
    y="420"
    text-anchor="middle"
    font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="1"
  >FOCUS</text>
</svg>
